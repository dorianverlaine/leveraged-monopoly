name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package (with dev + realtime extras)
        run: pip install -e ".[dev]"

      - name: Run engine / bots / simulation / realtime / persistence tests
        run: pytest -q

      - name: Run offline analysis tests (if present on this branch)
        run: |
          if [ -d "analysis/tests" ]; then
            pytest analysis/tests -q
          else
            echo "No analysis/tests directory on this branch -- skipping."
          fi
